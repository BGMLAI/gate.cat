# Privacy-preserving log formats for gate.cat. Intentionally omit client IPs,
# cookies, and request bodies. Install in /etc/nginx/conf.d/ (http context).
log_format gatecat_access '$time_iso8601 "$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent"';
log_format gatecat_events '$time_iso8601 "$request" $status "$http_referer"';
