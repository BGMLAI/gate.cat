# --- canonical: gate.cat (Cloudflare-proxied) ---
server {
    listen 80;
    listen 443 ssl;
    server_name gate.cat www.gate.cat;
    ssl_certificate /etc/letsencrypt/live/gate.cat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gate.cat/privkey.pem;

    # www -> apex
    if ($host = www.gate.cat) { return 301 https://gate.cat$request_uri; }

    root /opt/bgml/static/gatecat;
    index index.html;
    include /etc/nginx/snippets/gatecat-site-analytics.conf;

    location /api/subscribe {
        proxy_pass http://127.0.0.1:8092;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/report-miss {
        proxy_pass http://127.0.0.1:8092;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /packs/ {
        proxy_pass http://127.0.0.1:8791;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /cloud/v1/ {
        proxy_pass http://127.0.0.1:8094/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /cloud/lemonsqueezy/webhook { proxy_pass http://127.0.0.1:8095; }
    location /cloud/ls/webhook { proxy_pass http://127.0.0.1:8095; }
    location /cloud/stripe/webhook { proxy_pass http://127.0.0.1:8095; }
    location /cloud/activate {
        proxy_pass http://127.0.0.1:8095;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /cloud/health {
        proxy_pass http://127.0.0.1:8094/v1/health;
    }

    location / {
        # Landing copy changes during launch. Force browsers and intermediaries
        # to revalidate so a corrected install command cannot stay visible.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
    location ~* \.(css|js|png|jpg|svg|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# --- legacy: gatecat.bgml.ai -> 301 gate.cat (stare linki żyją) ---
server {
    listen 80;
    listen 443 ssl;
    server_name gatecat.bgml.ai;
    ssl_certificate /etc/letsencrypt/live/gatecat.bgml.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gatecat.bgml.ai/privkey.pem;
    return 301 https://gate.cat$request_uri;
}
