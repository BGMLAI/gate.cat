  <script>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

.5px solid var(--danger-line);border-radius:6px;padding:3px 7px;flex:none\">DENY<\u002Fspan><span style=\"flex:1;color:var(--ink);font-weight:600;font-size:13.5px\">history / log tamper<\u002Fspan><span style=\"color:var(--danger-deep);font-size:11.5px;text-align:right\">history wipe · force-push<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- incidents as worked examples: fact, not drama -->\n    <div style=\"margin-top:24px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft)\"># real incidents, matched to the wall that catches them<\u002Fdiv>\n    <div style=\"margin-top:12px;display:flex;flex-direction:column;gap:8px\" data-log=\"\">\n      <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:12px;border:1.5px solid var(--hairline);border-radius:12px;background:var(--surface);padding:13px 16px\">\n        <span style=\"font-size:10.5px;letter-spacing:.06em;color:var(--ink-soft);min-width:120px\">CURSOR · 2025<\u002Fspan>\n        <span style=\"flex:1;min-width:220px;font-size:12.5px;color:var(--ink-2)\">prod database and every backup wiped in ~9 seconds.<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:10.5px;font-weight:700;letter-spacing:.04em;color:var(--lime-deep);border:1.5px solid var(--lime-line);border-radius:999px;padding:4px 11px;white-space:nowrap\">caught by DB_DESTRUCTIVE<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:12px;border:1.5px solid var(--hairline);border-radius:12px;background:var(--surface);padding:13px 16px\">\n        <span style=\"font-size:10.5px;letter-spacing:.06em;color:var(--ink-soft);min-width:120px\">ANTIGRAVITY · 2026<\u002Fspan>\n        <span style=\"flex:1;min-width:220px;font-size:12.5px;color:var(--ink-2)\">a “clear the cache” instruction resolved to <code style=\"color:var(--danger-deep)\">rm -rf<\u002Fcode> at the drive root.<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:10.5px;font-weight:700;letter-spacing:.04em;color:var(--lime-deep);border:1.5px solid var(--lime-line);border-radius:999px;padding:4px 11px;white-space:nowrap\">caught by DELETE_ANALYZER<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:12px;border:1.5px solid var(--hairline);border-radius:12px;background:var(--surface);padding:13px 16px\">\n        <span style=\"font-size:10.5px;letter-spacing:.06em;color:var(--ink-soft);min-width:120px\">RUNAWAY LOOP<\u002Fspan>\n        <span style=\"flex:1;min-width:220px;font-size:12.5px;color:var(--ink-2)\">an unbounded loop burned ~$47k in paid API and infra — another case reached ~$106k.<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:10.5px;font-weight:700;letter-spacing:.04em;color:var(--lime-deep);border:1.5px solid var(--lime-line);border-radius:999px;padding:4px 11px;white-space:nowrap\">capped by runaway-loop brake<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:20px;display:flex;align-items:flex-start;gap:16px;border:2px solid var(--frame);border-radius:14px;background:var(--danger-wash);padding:20px 22px;box-shadow:6px 6px 0 0 var(--danger)\">\n      <span style=\"display:grid;place-items:center;width:38px;height:38px;flex:none;border-radius:10px;background:var(--danger);color:#fff;font-family:'Archivo Black',sans-serif;font-size:24px;line-height:1\">!<\u002Fspan>\n      <p style=\"margin:0;font-size:clamp(15px,1.9vw,20px);line-height:1.4;color:var(--ink)\"><b style=\"color:var(--danger-deep);font-weight:700\">this is not everything.<\u002Fb> a deny-list catches <b>known dangerous shapes<\u002Fb> — <b style=\"color:var(--danger-deep)\">obfuscated or novel commands can still slip.<\u002Fb> the bypass suite is published in the repo, not hidden.<\u002Fp>\n    <\u002Fdiv>\n    <p style=\"margin-top:12px;font-size:11px;color:var(--ink-soft)\">every incident links to its source — AI Incident Database, vendor trackers, press. stories we couldn't verify stay off this page.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ §4 HOW IT WORKS + SELF-DEFENSE ============ -->\n<section id=\"how\" style=\"padding:88px 0 0\" data-reveal=\"\">\n  <div style=\"border-top:2px solid var(--frame);padding-top:20px\">\n    <div style=\"display:flex;align-items:baseline;gap:12px;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)\"><span style=\"font-weight:700;color:var(--bg);background:var(--ink);padding:3px 9px;border-radius:7px\">mechanism<\u002Fspan>how it works<span style=\"flex:1;height:1px;background:var(--hairline);align-self:center\"><\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-size:clamp(28px,4.6vw,58px);margin-top:20px\">four stages, one verdict<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:28px\" data-cols3=\"\">\n      <div style=\"border:1.5px solid var(--hairline);border-radius:12px;background:var(--surface);padding:16px 18px\"><span style=\"font-size:10px;color:var(--ink-soft)\">01<\u002Fspan><div style=\"font-family:'Archivo Black',sans-serif;font-size:15px;text-transform:lowercase;margin-top:2px\">delete-analyzer<\u002Fdiv><p style=\"font-size:12px;color:var(--ink-2);margin-top:3px\">resolves the real path a command would destroy — caught by <i>what<\u002Fi> it deletes, not how it's spelled.<\u002Fp><\u002Fdiv>\n      <div style=\"border:1.5px solid var(--hairline);border-radius:12px;background:var(--surface);padding:16px 18px\"><span style=\"font-size:10px;color:var(--ink-soft)\">02<\u002Fspan><div style=\"font-family:'Archivo Black',sans-serif;font-size:15px;text-transform:lowercase;margin-top:2px\">policy walls · 69 rules<\u002Fdiv><p style=\"font-size:12px;color:var(--ink-2);margin-top:3px\">deterministic patterns for the irreversible class, first match wins.<\u002Fp><\u002Fdiv>\n      <div style=\"border:1.5px solid var(--hairline);border-radius:12px;background:var(--surface);padding:16px 18px\"><span style=\"font-size:10px;color:var(--ink-soft)\">03<\u002Fspan><div style=\"font-family:'Archivo Black',sans-serif;font-size:15px;text-transform:lowercase;margin-top:2px\">de-obfuscate<\u002Fdiv><p style=\"font-size:12px;color:var(--ink-2);margin-top:3px\">unwraps encoded and stacked payloads before matching — base64, nested quoting, chained commands.<\u002Fp><\u002Fdiv>\n      <div style=\"border:1.5px solid var(--hairline);border-radius:12px;background:var(--surface);padding:16px 18px\"><span style=\"font-size:10px;color:var(--ink-soft)\">04<\u002Fspan><div style=\"font-family:'Archivo Black',sans-serif;font-size:15px;text-transform:lowercase;margin-top:2px\">verb backstop<\u002Fdiv><p style=\"font-size:12px;color:var(--ink-2);margin-top:3px\">a suspicious-verb net for anything that slipped the walls. one verdict: <b style=\"color:var(--danger-deep)\">block<\u002Fb> / warn / <b style=\"color:var(--lime-deep)\">allow<\u002Fb>.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:24px;margin-top:34px;align-items:center\" data-split=\"\">\n      <div>\n        <h3 style=\"font-size:clamp(26px,4vw,48px);max-width:14ch\">the guard your agent can't kill<\u002Fh3>\n        <p style=\"color:var(--ink-2);font-size:15px;margin-top:16px;max-width:44ch\">a rogue agent's first move is to disable the guard. gate.cat refuses attempts to kill its own process or disable host security — the veto lives outside the model's reach.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:2px solid var(--frame);border-radius:14px;background:var(--surface);box-shadow:6px 6px 0 0 var(--frame);overflow:hidden\">\n        <div style=\"padding:9px 14px;background:var(--surface-2);border-bottom:1.5px solid var(--frame);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft)\">agent tries to disarm the guard<\u002Fdiv>\n        <div style=\"padding:16px 15px;font-size:13px;line-height:1.9\">\n          <div style=\"color:var(--ink-2)\"><span style=\"color:var(--danger-deep)\">$<\u002Fspan> pkill -f gatecat<\u002Fdiv>\n          <div style=\"color:var(--danger-deep);font-weight:600\">✕ REFUSED · guard self-defense<\u002Fdiv>\n          <div style=\"color:var(--ink-2);margin-top:4px\"><span style=\"color:var(--danger-deep)\">$<\u002Fspan> setenforce 0<\u002Fdiv>\n          <div style=\"color:var(--danger-deep);font-weight:600\">✕ REFUSED · host security<\u002Fdiv>\n          <div style=\"color:var(--ink-2);margin-top:4px\"><span style=\"color:var(--danger-deep)\">$<\u002Fspan> rm -rf /var/gatecat<\u002Fdiv>\n          <div style=\"color:var(--danger-deep);font-weight:600\">✕ REFUSED · protected path<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ §5 RELIEF ============ -->\n<section id=\"relief\" style=\"padding:88px 0 0\" data-reveal=\"\">\n  <div style=\"border-top:2px solid var(--frame);padding-top:20px\">\n    <div style=\"display:flex;align-items:baseline;gap:12px;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)\"><span style=\"font-weight:700;color:var(--bg);background:var(--ink);padding:3px 9px;border-radius:7px\">relief<\u002Fspan>the morning after<span style=\"flex:1;height:1px;background:var(--hairline);align-self:center\"><\u002Fspan><\u002Fdiv>\n    <p style=\"color:var(--ink-2);font-size:clamp(15px,1.8vw,18px);margin-top:20px;max-width:52ch;line-height:1.5\">enforcement is a non-event. you find out in the morning — from the log.<\u002Fp>\n    <div style=\"margin-top:24px;max-width:560px;border:2px solid var(--frame);border-radius:14px;background:var(--surface);box-shadow:8px 8px 0 0 var(--lime);overflow:hidden\">\n      <div style=\"padding:9px 14px;background:var(--surface-2);border-bottom:1.5px solid var(--frame);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft)\">overnight · one machine<\u002Fdiv>\n      <pre style=\"margin:0;padding:18px 16px;font-size:14px;line-height:1.8;color:var(--ink-2);white-space:pre-wrap\"><span style=\"color:var(--lime-deep);font-weight:700\">$<\u002Fspan> gate.cat log --since 22:00\n  <span style=\"color:var(--danger-deep);font-weight:700\">3 vetoed<\u002Fspan> · <span style=\"color:var(--ink);font-weight:700\">0 executed<\u002Fspan> · <span style=\"color:var(--lime-deep);font-weight:700\">repo intact<\u002Fspan><\u002Fpre>\n    <\u002Fdiv>\n    <p style=\"margin-top:16px;font-size:clamp(16px,2vw,22px);color:var(--ink);font-family:'Archivo Black',sans-serif;text-transform:lowercase;letter-spacing:-.02em\">3 commands vetoed overnight. 0 executed.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ §6 SETUP ============ -->\n<section id=\"setup\" style=\"padding:88px 0 0\" data-reveal=\"\">\n  <div style=\"border-top:2px solid var(--frame);padding-top:20px\">\n    <div style=\"display:flex;align-items:baseline;gap:12px;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)\"><span style=\"font-weight:700;color:var(--bg);background:var(--ink);padding:3px 9px;border-radius:7px\">setup<\u002Fspan>runs in front<span style=\"flex:1;height:1px;background:var(--hairline);align-self:center\"><\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-size:clamp(30px,5vw,64px);margin-top:20px\">sits in front of the agent you already run<\u002Fh2>\n    <p style=\"color:var(--ink-2);font-size:15px;margin-top:16px;max-width:64ch\">no new agent, no swap. gate.cat wedges in where commands leave the model — works with <b style=\"color:var(--ink)\">Claude Code · Cursor · Codex · aider<\u002Fb>, three ways in, one verdict.<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:30px\" data-cols3=\"\">\n      <div style=\"border:2px solid var(--frame);border-radius:14px;background:var(--surface);padding:22px 20px;display:flex;flex-direction:column;box-shadow:6px 6px 0 0 var(--lime)\">\n        <span style=\"font-size:9.5px;font-weight:700;letter-spacing:.06em;color:var(--lime-deep);background:var(--bg);border:1.5px solid var(--lime-line);border-radius:6px;padding:3px 7px;align-self:flex-start\">native hook<\u002Fspan>\n        <div style=\"font-family:'Archivo Black',sans-serif;font-size:19px;text-transform:lowercase;margin-top:14px\">claude code · cursor<\u002Fdiv>\n        <p style=\"color:var(--ink-2);font-size:12.5px;margin-top:8px;flex:1\">enforced in the harness, <b style=\"color:var(--ink)\">outside the model<\u002Fb>. the veto fires in the tool's own hook path — the model never gets to route around it.<\u002Fp>\n        <div style=\"margin-top:14px;border:1.5px solid var(--hairline);border-radius:9px;background:var(--bg);padding:10px 12px;font-size:11.5px;color:var(--ink-2)\"><span style=\"color:var(--lime-deep)\">+<\u002Fspan> settings.json → <b style=\"color:var(--ink)\">gatecat-hook<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:1.5px solid var(--frame);border-radius:14px;background:var(--surface);padding:22px 20px;display:flex;flex-direction:column\">\n        <span style=\"font-size:9.5px;font-weight:700;letter-spacing:.06em;color:var(--ink);background:var(--surface-2);border:1.5px solid var(--hairline);border-radius:6px;padding:3px 7px;align-self:flex-start\">gated shell<\u002Fspan>\n        <div style=\"font-family:'Archivo Black',sans-serif;font-size:19px;text-transform:lowercase;margin-top:14px\">codex · aider · openclaw · hermes · antigravity<\u002Fdiv>\n        <p style=\"color:var(--ink-2);font-size:12.5px;margin-top:8px;flex:1\">route the tool's shell through <b style=\"color:var(--ink)\">gatecat-shell<\u002Fb>. gated <b style=\"color:var(--ink)\">at the exec point<\u002Fb> — same strength as the native hook, for agents without one.<\u002Fp>\n        <div style=\"margin-top:14px;border:1.5px solid var(--hairline);border-radius:9px;background:var(--bg);padding:10px 12px;font-size:11.5px;color:var(--ink-2)\"><span style=\"color:var(--lime-deep)\">$<\u002Fspan> shell = <b style=\"color:var(--ink)\">gatecat-shell<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:1.5px solid var(--frame);border-radius:14px;background:var(--surface);padding:22px 20px;display:flex;flex-direction:column\">\n        <span style=\"font-size:9.5px;font-weight:700;letter-spacing:.06em;color:var(--ink);background:var(--surface-2);border:1.5px solid var(--hairline);border-radius:6px;padding:3px 7px;align-self:flex-start\">proxy<\u002Fspan>\n        <div style=\"font-family:'Archivo Black',sans-serif;font-size:19px;text-transform:lowercase;margin-top:14px\">github copilot · ollama · vllm<\u002Fdiv>\n        <p style=\"color:var(--ink-2);font-size:12.5px;margin-top:8px;flex:1\">point <code style=\"color:var(--ink)\">base_url<\u002Fcode> at gate.cat. every tool-call the model emits passes the gate <b style=\"color:var(--ink)\">before it reaches the runtime<\u002Fb>.<\u002Fp>\n        <div style=\"margin-top:14px;border:1.5px solid var(--hairline);border-radius:9px;background:var(--bg);padding:10px 12px;font-size:11.5px;color:var(--ink-2)\"><span style=\"color:var(--lime-deep)\">→<\u002Fspan> base_url = <b style=\"color:var(--ink)\">gate.cat<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:20px;max-width:440px;display:flex;align-items:center;gap:12px;border:2px solid var(--frame);border-radius:12px;background:var(--surface);padding:13px 16px;box-shadow:5px 5px 0 0 var(--frame);font-size:15px\">\n      <span style=\"color:var(--lime-deep);font-weight:700\">$<\u002Fspan>\n      <span style=\"flex:1;color:var(--ink);font-size:clamp(9px,2vw,12.5px);line-height:1.5;overflow-wrap:anywhere\">curl -fsSL https://gate.cat/install.sh -o /tmp/gatecat-install.sh<br>sh /tmp/gatecat-install.sh<\u002Fspan>\n      <button data-copy=\"\" aria-label=\"Copy install command\" style=\"font-family:inherit;font-size:11.5px;font-weight:700;color:var(--ink);background:var(--bg);border:1.5px solid var(--frame);border-radius:8px;padding:7px 11px;cursor:pointer;white-space:nowrap\">⧉ copy<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ §7 PROOF ============ -->\n<section id=\"proof\" style=\"padding:88px 0 0\" data-reveal=\"\">\n  <div style=\"border-top:2px solid var(--frame);padding-top:20px\">\n    <div style=\"display:flex;align-items:baseline;gap:12px;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)\"><span style=\"font-weight:700;color:var(--bg);background:var(--ink);padding:3px 9px;border-radius:7px\">proof<\u002Fspan>measured, not claimed<span style=\"flex:1;height:1px;background:var(--hairline);align-self:center\"><\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-size:clamp(30px,5vw,64px);margin-top:20px\">tested against the danger set<\u002Fh2>\n    <p style=\"color:var(--ink-2);font-size:15px;margin-top:16px;max-width:60ch\">the suite runs in CI on every commit. the corpus and the one false-block are both in the repo — nothing here is behind a slide.<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:30px;border:1.5px solid var(--frame);border-radius:14px;overflow:hidden\" data-cols3=\"\">\n      <a href=\"https://github.com/BGMLAI/gate.cat\" style=\"display:block;padding:26px 22px;border-right:1px solid var(--hairline);color:inherit\"><div style=\"font-family:'Archivo Black',sans-serif;font-size:clamp(30px,4.4vw,50px);line-height:.9\">1<\u002Fdiv><p style=\"color:var(--ink-2);font-size:12.5px;margin-top:12px\"><b style=\"color:var(--ink)\">documented false-block<\u002Fb> — here it is in the repo. we didn't hide it. <span style=\"color:var(--lime-deep);border-bottom:1px dotted currentColor\">see the commit →<\u002Fspan><\u002Fp><\u002Fa>\n      <a href=\"https://github.com/BGMLAI/gate.cat\" style=\"display:block;padding:26px 22px;border-right:1px solid var(--hairline);color:inherit\"><div style=\"font-family:'Archivo Black',sans-serif;font-size:clamp(30px,4.4vw,50px);color:var(--lime-deep);line-height:.9\"><span id=\"gc-n178\">178<\u002Fspan><span style=\"color:var(--ink-faint)\">/178<\u002Fspan><\u002Fdiv><p style=\"color:var(--ink-2);font-size:12.5px;margin-top:12px\">in the <b style=\"color:var(--ink)\">irreversible-command test suite<\u002Fb>. <span style=\"color:var(--lime-deep);border-bottom:1px dotted currentColor\">see the suite →<\u002Fspan><\u002Fp><\u002Fa>\n      <a href=\"https://github.com/BGMLAI/gate.cat\" style=\"display:block;padding:26px 22px;color:inherit\"><div style=\"font-family:'Archivo Black',sans-serif;font-size:clamp(24px,3.6vw,40px);line-height:.9\" id=\"gc-count\">1,085,159<\u002Fdiv><p style=\"color:var(--ink-2);font-size:12.5px;margin-top:12px\">real agent commands <b style=\"color:var(--ink)\">replayed<\u002Fb> through the gate. <span style=\"color:var(--lime-deep);border-bottom:1px dotted currentColor\">see the replay →<\u002Fspan><\u002Fp><\u002Fa>\n    <\u002Fdiv>\n    <p style=\"margin-top:14px;font-size:12.5px;color:var(--ink-2);max-width:64ch\">a tool that reports its own single miss is a tool you can trust on its hits.<\u002Fp>\n    <p style=\"margin-top:8px;font-size:11px;color:var(--ink-soft)\">numbers reflect the covered set only. an obfuscated or novel command outside the corpus can still slip — see the caveat above.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ §8 PRICING ============ -->\n<section id=\"pricing\" style=\"padding:88px 0 0\" data-reveal=\"\">\n  <div style=\"border-top:2px solid var(--frame);padding-top:20px\">\n    <div style=\"display:flex;align-items:baseline;gap:12px;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)\"><span style=\"font-weight:700;color:var(--bg);background:var(--ink);padding:3px 9px;border-radius:7px\">pricing<\u002Fspan>pricing<span style=\"flex:1;height:1px;background:var(--hairline);align-self:center\"><\u002Fspan><\u002Fdiv>\n    <h2 style=\"font-size:clamp(28px,4.6vw,60px);margin-top:20px;max-width:20ch\">blocking is always free. it's the open-source core.<\u002Fh2>\n    <p style=\"color:var(--ink-2);font-size:15px;margin-top:16px;max-width:60ch\"><code style=\"color:var(--lime-deep);font-weight:700\">the reviewed local installer<\u002Fcode> — the gate, all 69 policies, the hook and the proxy, apache 2.0. cloud adds a record and fleet alerts, <b style=\"color:var(--ink)\">never the blocking<\u002Fb>.<\u002Fp>\n\n    <div style=\"margin-top:30px;max-width:560px;border:2px solid var(--frame);border-radius:16px;padding:28px 26px;background:var(--surface);box-shadow:8px 8px 0 0 var(--lime);animation:gc-glow 3s ease-in-out infinite\">\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap\">\n        <span style=\"font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--lime-deep);font-weight:700\">Cloud Solo · founding<\u002Fspan>\n        <span id=\"gc-seats\" style=\"font-size:10.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-2)\">founding · ends August 3 · then €19<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-family:'Archivo Black',sans-serif;font-size:56px;margin-top:12px;line-height:1\"><span style=\"font-size:.4em;color:var(--ink-soft);text-decoration:line-through;font-weight:400;letter-spacing:.02em;margin-right:10px;vertical-align:middle\">€19<\u002Fspan>€9<small style=\"font-size:.24em;color:var(--ink-soft);font-weight:400;letter-spacing:.02em\"> /mo · founding price — locked for life, then €19<\u002Fsmall><\u002Fdiv>\n      <p style=\"color:var(--ink-2);font-size:13px;margin-top:14px;max-width:46ch\">a <b style=\"color:var(--ink)\">tamper-evident record of every block<\u002Fb> — on hardware the blocked process never touched — plus push &amp; email alerts across your fleet.<\u002Fp>\n      <a href=\"https://buy.stripe.com/14AaEQ6BncTmctGbrU67S0f\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:8px;margin-top:18px;font-weight:700;font-size:14.5px;padding:13px 22px;border:1.5px solid var(--frame);border-radius:999px;background:var(--lime);color:#0f0f0d\">start solo · €9<svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fa>\n      <p style=\"margin-top:14px;font-size:11.5px;color:var(--ink-soft)\">cancel in one click. your free gate stays yours forever — blocking never expires.<\u002Fp>\n    <\u002Fdiv>\n\n    <p style=\"margin-top:16px;font-size:13px;color:var(--ink-2)\">need more than one machine? <a href=\"https://buy.stripe.com/9B66oA5xj2eIaly2Vo67S0a\" style=\"border-bottom:1px dotted currentColor\">Team · €149/mo flat<\u002Fa> · <a href=\"https://buy.stripe.com/7sYdR2e3PcTm2T6cvY67S0b\" style=\"border-bottom:1px dotted currentColor\">Business · €399/mo<\u002Fa> — up to 10 machines, signed policy sync, fleet report.<\u002Fp>\n\n    <div style=\"margin-top:16px;display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between;border:1.5px solid var(--frame);border-radius:14px;padding:16px 22px;background:var(--lime-wash)\">\n      <span style=\"font-size:13px;color:var(--ink-2)\"><b style=\"color:var(--ink)\">one-time policy packs — €29.<\u002Fb> stack-specific breadth: Fintech · PaaS · HTTP-API. lifetime updates.<\u002Fspan>\n      <div style=\"display:flex;flex-wrap:wrap;gap:8px\"><a href=\"https://buy.stripe.com/dRm5kw6Bn3iMfFS1Rk67S0c\" style=\"display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:#0f0f0d;background:var(--lime);border:1.5px solid var(--frame);border-radius:999px;padding:9px 15px;white-space:nowrap\">Fintech · €29 →<\u002Fa><a href=\"https://buy.stripe.com/3cI5kw3pbaLeeBO2Vo67S0d\" style=\"display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:#0f0f0d;background:var(--lime);border:1.5px solid var(--frame);border-radius:999px;padding:9px 15px;white-space:nowrap\">PaaS · €29 →<\u002Fa><a href=\"https://buy.stripe.com/aFa8wIgbX06AdxK67A67S0e\" style=\"display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:#0f0f0d;background:var(--lime);border:1.5px solid var(--frame);border-radius:999px;padding:9px 15px;white-space:nowrap\">HTTP-API · €29 →<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin-top:10px;font-size:11px;color:var(--ink-soft)\">secure checkout &amp; billing via Stripe — it handles EU VAT for you. founding price locked for the life of the plan.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ §9 FAQ ============ -->\n<section id=\"faq\" style=\"padding:88px 0 0\" data-reveal=\"\">\n  <div style=\"border-top:2px solid var(--frame);padding-top:20px\">\n    <div style=\"display:flex;align-items:baseline;gap:12px;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)\"><span style=\"font-weight:700;color:var(--bg);background:var(--ink);padding:3px 9px;border-radius:7px\">faq<\u002Fspan>the short version<span style=\"flex:1;height:1px;background:var(--hairline);align-self:center\"><\u002Fspan><\u002Fdiv>\n    <div style=\"margin-top:28px;display:flex;flex-direction:column;gap:10px\">\n      <details style=\"border:1.5px solid var(--frame);border-radius:12px;background:var(--surface);overflow:hidden\">\n        <summary style=\"list-style:none;cursor:pointer;display:flex;align-items:center;gap:12px;padding:16px 18px;font-family:'Archivo Black',sans-serif;font-size:16px;text-transform:lowercase\"><span style=\"color:var(--lime-deep)\">01<\u002Fspan>does it slow my agent down?<span aria-hidden=\"true\" style=\"margin-left:auto;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700\">+<\u002Fspan><\u002Fsummary>\n        <p style=\"margin:0;padding:0 18px 18px;color:var(--ink-2);font-size:13.5px;line-height:1.6\">no. the check is deterministic string and path analysis — sub-millisecond, and there's <b style=\"color:var(--ink)\">no model call in the path<\u002Fb>, so there's no added latency you'd feel.<\u002Fp>\n      <\u002Fdetails>\n      <details style=\"border:1.5px solid var(--frame);border-radius:12px;background:var(--surface);overflow:hidden\">\n        <summary style=\"list-style:none;cursor:pointer;display:flex;align-items:center;gap:12px;padding:16px 18px;font-family:'Archivo Black',sans-serif;font-size:16px;text-transform:lowercase\"><span style=\"color:var(--lime-deep)\">02<\u002Fspan>does it block legit commands?<span aria-hidden=\"true\" style=\"margin-left:auto;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700\">+<\u002Fspan><\u002Fsummary>\n        <p style=\"margin:0;padding:0 18px 18px;color:var(--ink-2);font-size:13.5px;line-height:1.6\">it targets the <b style=\"color:var(--ink)\">irreversible class<\u002Fb> — everyday commands pass untouched. across 1,085,159 replayed commands there is <b style=\"color:var(--ink)\">one documented false-block<\u002Fb>, logged in the open and fixed in the repo.<\u002Fp>\n      <\u002Fdetails>\n      <details style=\"border:1.5px solid var(--danger-line);border-radius:12px;background:var(--danger-wash);overflow:hidden\">\n        <summary style=\"list-style:none;cursor:pointer;display:flex;align-items:center;gap:12px;padding:16px 18px;font-family:'Archivo Black',sans-serif;font-size:16px;text-transform:lowercase\"><span style=\"color:var(--danger-deep)\">03<\u002Fspan>what's the one false-block?<span aria-hidden=\"true\" style=\"margin-left:auto;color:var(--danger-deep);font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700\">+<\u002Fspan><\u002Fsummary>\n        <p style=\"margin:0;padding:0 18px 18px;color:var(--ink-2);font-size:13.5px;line-height:1.6\">a single over-broad match we caught in testing. rather than bury it, we <b style=\"color:var(--ink)\">wrote it into the repo<\u002Fb> — the case, the fix, and the regression test are all public. one miss you can read beats a clean number you can't.<\u002Fp>\n      <\u002Fdetails>\n      <details style=\"border:1.5px solid var(--frame);border-radius:12px;background:var(--surface);overflow:hidden\">\n        <summary style=\"list-style:none;cursor:pointer;display:flex;align-items:center;gap:12px;padding:16px 18px;font-family:'Archivo Black',sans-serif;font-size:16px;text-transform:lowercase\"><span style=\"color:var(--lime-deep)\">04<\u002Fspan>can I inspect the policies?<span aria-hidden=\"true\" style=\"margin-left:auto;color:var(--ink-soft);font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700\">+<\u002Fspan><\u002Fsummary>\n        <p style=\"margin:0;padding:0 18px 18px;color:var(--ink-2);font-size:13.5px;line-height:1.6\">yes — every policy is plain-text in the repo. <b style=\"color:var(--ink)\">review<\u002Fb> them, fork them, or add your own. inspect before you trust; nothing runs that you can't read.<\u002Fp>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ §10 FINAL CTA ============ -->\n<section id=\"install\" style=\"padding:88px 0 0\" data-reveal=\"\">\n  <div style=\"border-top:2px solid var(--frame);padding-top:20px;text-align:center\">\n    <img src=\"9a04bfef-a063-4969-96ce-6159fc60a3cb\" alt=\"\" style=\"height:52px;width:auto;margin:0 auto;display:block\">\n    <h2 style=\"font-size:clamp(28px,4.8vw,62px);margin-top:20px;max-width:22ch;margin-left:auto;margin-right:auto\">it's 3am. the agent hit <span style=\"color:#FFFFFF;background-color:#FF0019;padding:.02em .1em;-webkit-box-decoration-break:clone;box-decoration-break:clone\">rm -rf<\u002Fspan>. the log says 0 executed.<\u002Fh2>\n    <div style=\"margin:28px auto 0;max-width:460px;display:flex;align-items:center;gap:12px;border:2px solid var(--frame);border-radius:12px;background:var(--surface);padding:15px 18px;box-shadow:6px 6px 0 0 var(--frame);font-size:15px;text-align:left\">\n      <span style=\"color:var(--lime-deep);font-weight:700\">$<\u002Fspan>\n      <span style=\"flex:1;color:var(--ink);font-size:clamp(9px,2vw,12.5px);line-height:1.5;overflow-wrap:anywhere\">curl -fsSL https://gate.cat/install.sh -o /tmp/gatecat-install.sh<br>sh /tmp/gatecat-install.sh<\u002Fspan>\n      <button data-copy=\"\" aria-label=\"Copy install command\" style=\"font-family:inherit;font-size:11.5px;font-weight:700;color:var(--ink);background:var(--bg);border:1.5px solid var(--frame);border-radius:8px;padding:7px 11px;cursor:pointer;white-space:nowrap\">⧉ copy<\u002Fbutton>\n    <\u002Fdiv>\n    <p style=\"margin-top:14px;font-size:11.5px;color:var(--ink-soft)\">then add <b style=\"color:var(--ink)\">gatecat-hook<\u002Fb> to .claude/settings.json, or run <b style=\"color:var(--ink)\">gatecat-proxy<\u002Fb><\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<footer style=\"max-width:1120px;margin:52px auto 0;padding:22px;border-top:1.5px solid var(--frame)\">\n  <div style=\"display:flex;flex-wrap:wrap;gap:12px;justify-content:space-between;align-items:center;font-size:11px;color:var(--ink-soft)\">\n    <span>gate.cat — fail-closed action-veto for AI agents · apache 2.0<\u002Fspan>\n    <span><a href=\"https://pypi.org/project/gate.cat/\">PyPI<\u002Fa> · <a href=\"https://github.com/BGMLAI/gate.cat\">GitHub<\u002Fa> · built by <a href=\"https://bgml.ai\">BGML.ai<\u002Fa><\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- sticky install, pinned from §2 down -->\n<div id=\"gc-sticky\" style=\"position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(14px);z-index:90;opacity:0;pointer-events:none;transition:opacity .3s ease,transform .3s ease;display:flex;align-items:center;gap:10px;border:1.5px solid var(--frame);border-radius:999px;background:var(--surface);box-shadow:4px 4px 0 0 var(--frame);padding:8px 8px 8px 16px\">\n  <span style=\"color:var(--lime-deep);font-weight:700\">$<\u002Fspan>\n  <span style=\"color:var(--ink);font-size:13px;white-space:nowrap\">install safely<\u002Fspan>\n  <button data-copy=\"\" aria-label=\"Copy install command\" style=\"font-family:inherit;font-size:11px;font-weight:700;color:#0f0f0d;background:var(--lime);border:1.5px solid var(--frame);border-radius:999px;padding:7px 12px;cursor:pointer;white-space:nowrap\">⧉ copy<\u002Fbutton>\n<\u002Fdiv>\n\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;startTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;foundingSeatsLeft&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:0,&quot;min&quot;:0,&quot;max&quot;:50,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Pricing&quot;}}\">\nclass Component extends DCLogic {\n  evalCmd(raw){\n    const c = (raw||'').trim();\n    if(!c) return {v:'IDLE'};\n    const rules = [\n      [/\\brm\\s+-\\S*\\b.*(\\/|~|\\*|\\.\\.)|\\brm\\s+-[a-z]*r[a-z]*f|\\brm\\s+-[a-z]*f[a-z]*r|\\brm\\s+-rf|\\brm\\s+-fr/i, 'FS_RECURSIVE_DELETE', 'recursive force delete'],\n      [/\\b(wipefs|shred)\\b|\\bmkfs\\.?\\w*\\b|\\bdd\\b[^\\n]*of=\\/dev\\//i, 'DISK_WIPE', 'raw disk write / wipe'],\n      [/\\bDROP\\s+(TABLE|DATABASE|SCHEMA)\\b|\\bTRUNCATE\\s+TABLE\\b|\\bFLUSHALL\\b|\\bFLUSHDB\\b/i, 'DB_DESTRUCTIVE', 'database drop / flush'],\n      [/terraform\\s+destroy|\\baws\\b[^\\n]*\\bdelete|\\bgcloud\\b[^\\n]*\\bdelete|\\baz\\b[^\\n]*\\bdelete/i, 'CLOUD_TEARDOWN', 'cloud teardown'],\n      [/kubectl\\s+delete|helm\\s+(uninstall|delete)/i, 'K8S_DELETE', 'kubernetes delete'],\n      [/git\\s+push[^\\n]*(--force|\\s-f\\b)|git\\s+reset\\s+--hard|gh\\s+repo\\s+delete|git\\s+branch\\s+-D/i, 'REPO_HISTORY', 'repo / history destroy'],\n      [/(pkill|kill|killall)[^\\n]*gatecat|setenforce\\s+0|systemctl\\s+(stop|disable)[^\\n]*gatecat|rm[^\\n]*gatecat/i, 'GUARD_SELF_DEFENSE', 'guard self-defense'],\n      [/(\\.ssh|id_rsa|\\.aws|credentials|\\.env)\\b[^\\n]*(rm|unlink|shred)|\\b(rm|unlink|shred)\\b[^\\n]*(\\.ssh|id_rsa|\\.aws|credentials|\\.env)/i, 'SECRET_DESTROY', 'secret / key destroy'],\n      [/:\\s*\\(\\s*\\)\\s*\\{[^\\}]*\\|[^\\}]*&\\s*\\}\\s*;\\s*:/, 'FORK_BOMB', 'fork bomb']\n    ];\n    for(const [re,policy,label] of rules){ if(re.test(c)) return {v:'BLOCK', policy, label}; }\n    return {v:'ALLOW'};\n  }\n\n  componentDidMount(){\n    const root = document.documentElement;\n    try { if(!localStorage.getItem('gatecat-theme') && this.props.startTheme){ root.setAttribute('data-theme', this.props.startTheme); } } catch(e){}\n\n    // pricing label is static; no fabricated live counter\n\n    // theme toggle\n    const btn = document.getElementById('gc-theme');\n    const syncIcons = () => { const dark = root.getAttribute('data-theme')==='dark'; const m=document.querySelector('.gc-moon'), s=document.querySelector('.gc-sun'); if(m)m.style.display=dark?'none':'block'; if(s)s.style.display=dark?'block':'none'; };\n    syncIcons();\n    if(btn) btn.addEventListener('click', () => { const n=root.getAttribute('data-theme')==='dark'?'light':'dark'; root.setAttribute('data-theme',n); try{localStorage.setItem('gatecat-theme',n);}catch(e){} syncIcons(); });\n\n    // interactive deny-list — check any command\n    const input = document.getElementById('gc-input');\n    const out = document.getElementById('gc-verdict');\n    const flash = (c) => { try{ out.animate([{backgroundColor:c,borderRadius:'8px'},{backgroundColor:'transparent',borderRadius:'8px'}],{duration:480,easing:'ease-out'}); }catch(e){} };\n    const render = (val) => {\n      const r = this.evalCmd(val);\n      if(r.v==='IDLE'){ out.innerHTML = '<span style=\"color:var(--ink-soft)\">▸ awaiting a command…<\u002Fspan>'; return; }\n      if(r.v==='BLOCK'){ out.innerHTML = '<span style=\"color:var(--danger-deep);font-weight:700\">✕ DENIED<\u002Fspan> · <span style=\"color:var(--ink)\">'+r.label+'<\u002Fspan> — refused before it runs&nbsp;&nbsp;<span style=\"color:var(--ink-soft)\">['+r.policy+']<\u002Fspan>'; flash('var(--danger-wash)'); return; }\n      out.innerHTML = '<span style=\"color:var(--lime-deep);font-weight:700\">✓ ALLOW<\u002Fspan> · <span style=\"color:var(--ink)\">runs untouched<\u002Fspan> — not a known dangerous shape'; flash('var(--lime-wash)');\n    };\n    if(input){ input.addEventListener('input', e => render(e.target.value)); }\n    document.querySelectorAll('#gc-chips button').forEach(b => {\n      b.addEventListener('click', () => { if(input){ input.value = b.getAttribute('data-cmd'); input.focus(); render(input.value); } });\n    });\n\n    // hero autoplay: the veto, one thing, then the prompt returns intact\n    const feed = document.getElementById('gc-feed');\n    if(feed){\n      const sleep = ms => new Promise(r=>setTimeout(r,ms));\n      const mk = html => { const d=document.createElement('div'); d.style.marginTop='2px'; d.innerHTML=html; feed.appendChild(d); return d; };\n      const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;\n      (async () => {\n        mk('<span style=\"color:var(--ink-soft)\"># your agent proposes a command — gate.cat sees it first<\u002Fspan>');\n        const line = mk('<span style=\"color:var(--lime-deep);font-weight:700\">agent$<\u002Fspan> ');\n        const span = document.createElement('span'); line.appendChild(span);\n        const cmd = 'rm -rf /';\n        if(reduce){ span.textContent = cmd; }\n        else {\n          span.style.borderRight = '2px solid var(--lime-deep)';\n          span.style.animation = 'gc-blink 1s step-end infinite';\n          for(let i=0;i<cmd.length;i++){ span.textContent += cmd[i]; await sleep(70); }\n          await sleep(320);\n          span.style.borderRight = 'none'; span.style.animation = 'none';\n        }\n        mk('<span style=\"color:var(--danger-deep);font-weight:700\">✕ DENIED<\u002Fspan> <span style=\"color:var(--ink)\">by policy: <b>irreversible-delete<\u002Fb> — refused before it ran<\u002Fspan>');\n        await sleep(reduce?0:380);\n        const p = mk('<span style=\"color:var(--ink-soft)\"># the prompt returns intact — nothing happened<\u002Fspan>'); p.style.marginTop='8px';\n        mk('<span style=\"color:var(--lime-deep);font-weight:700\">$<\u002Fspan> <span aria-hidden=\"true\" style=\"display:inline-block;width:.5em;height:1.02em;background:var(--lime);vertical-align:-.12em;animation:gc-blink 1.05s step-end infinite\"><\u002Fspan>');\n      })();\n    }\n\n    // copy buttons (hero box, hero CTA, setup, final CTA, sticky)\n    const copyCmd = 'curl -fsSL https://gate.cat/install.sh -o /tmp/gatecat-install.sh\\nsh /tmp/gatecat-install.sh';\n    document.querySelectorAll('[data-copy]').forEach(b => {\n      b.addEventListener('click', () => {\n        try { navigator.clipboard && navigator.clipboard.writeText(copyCmd); } catch(e){}\n        if(!b.getAttribute('data-label')) b.setAttribute('data-label', b.textContent);\n        const bg = b.style.background;\n        b.textContent = '✓ copied';\n        setTimeout(() => { b.textContent = b.getAttribute('data-label'); b.style.background = bg; }, 1500);\n      });\n    });\n\n    // count-up (once, no live ticking)\n    const countUp = (el, target, fmt) => {\n      if(!el) return;\n      if(matchMedia('(prefers-reduced-motion:reduce)').matches){ el.textContent = fmt(target); return; }\n      let started = false;\n      const run = () => { let cur = 0; const step = Math.ceil(target/55); const t = setInterval(() => { cur += step; if(cur>=target){ cur = target; clearInterval(t); } el.textContent = fmt(cur); }, 20); };\n      const io = new IntersectionObserver(en => { en.forEach(x => { if(x.isIntersecting && !started){ started = true; run(); io.disconnect(); } }); }, { threshold:.4 });\n      io.observe(el);\n    };\n    countUp(document.getElementById('gc-count'), 1085159, n => n.toLocaleString('en-US'));\n    countUp(document.getElementById('gc-n178'), 178, n => String(n));\n\n    // sticky install: appears at §2, hides at final CTA\n    const sticky = document.getElementById('gc-sticky');\n    const turnEl = document.getElementById('turn');\n    const finalEl = document.getElementById('install');\n    if(sticky && turnEl && finalEl){\n      let ticking = false;\n      const upd = () => {\n        const t = turnEl.getBoundingClientRect().top;\n        const f = finalEl.getBoundingClientRect().top;\n        const show = t < 120 && f > window.innerHeight * 0.55;\n        sticky.style.opacity = show ? '1' : '0';\n        sticky.style.transform = 'translateX(-50%) translateY(' + (show ? '0' : '14px') + ')';\n        sticky.style.pointerEvents = show ? 'auto' : 'none';\n      };\n      window.addEventListener('scroll', () => { if(!ticking){ ticking = true; requestAnimationFrame(() => { upd(); ticking = false; }); } }, { passive:true });\n      window.addEventListener('resize', upd, { passive:true });\n      upd();\n    }\n\n    // reveal\n    const els = Array.prototype.slice.call(document.querySelectorAll('[data-reveal]'));\n    if(matchMedia('(prefers-reduced-motion:reduce)').matches || !('IntersectionObserver' in window)) return;\n    els.forEach(e => { e.style.opacity='0'; e.style.transform='translateY(16px)'; e.style.transition='opacity .55s cubic-bezier(.16,1,.3,1),transform .55s cubic-bezier(.16,1,.3,1)'; });\n    const io = new IntersectionObserver(en => { en.forEach(x => { if(x.isIntersecting){ x.target.style.opacity='1'; x.target.style.transform='none'; io.unobserve(x.target); } }); }, { threshold:.08 });\n    els.forEach(e => io.observe(e));\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
  <script>
    // First-party, cookieless funnel events. The endpoint records only the
    // event, campaign tags, referrer host, and a per-tab random identifier.
    (() => {
      const clean = (value, limit = 80) => String(value || "")
        .replace(/[^a-zA-Z0-9._:/-]/g, "_")
        .slice(0, limit);
      const query = new URLSearchParams(window.location.search);
      let session = "";
      try {
        session = sessionStorage.getItem("gatecat-session") ||
          crypto.getRandomValues(new Uint32Array(2)).join("");
        sessionStorage.setItem("gatecat-session", session);
      } catch (_) {
        session = "anonymous";
      }
      let referrer = "";
      try { referrer = document.referrer ? new URL(document.referrer).hostname : ""; } catch (_) {}

      const track = (event, label = "") => {
        const data = new URLSearchParams({
          e: clean(event),
          label: clean(label),
          sid: clean(session),
          source: clean(query.get("utm_source")),
          medium: clean(query.get("utm_medium")),
          campaign: clean(query.get("utm_campaign")),
          ref: clean(referrer),
        });
        const url = `/events?${data.toString()}`;
        try {
          fetch(url, {
            method: "POST",
            keepalive: true,
            credentials: "omit",
            cache: "no-store",
          }).catch(() => {
            if (navigator.sendBeacon) navigator.sendBeacon(url, "");
            else (new Image()).src = url;
          });
        } catch (_) {
          try { (new Image()).src = url; } catch (_) {}
        }
      };

      track("page_view");
      document.addEventListener("click", (event) => {
        const target = event.target.closest("a,button");
        if (!target) return;
        if (target.matches("[data-copy]")) {
          track("install_copy", target.closest("#gc-sticky") ? "sticky" : "page");
          return;
        }
        const href = target.getAttribute("href") || "";
        if (href.includes("buy.stripe.com")) {
          track("checkout_click", clean(target.textContent, 40));
        } else if (href.includes("github.com/BGMLAI/gate.cat")) {
          track("github_click", clean(target.textContent, 40));
        } else if (href.includes("pypi.org/project/gate.cat")) {
          track("pypi_click", clean(target.textContent, 40));
        }
      }, { capture: true });
    })();
  </script>
